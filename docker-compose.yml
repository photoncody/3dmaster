services:
  3dmaster:
    image: ghcr.io/photoncody/3dmaster:latest
    # build: .
    ports:
      - "3000:3000"
    environment:
      AUTH_ENABLED: false # Change to true if you need auth
      ALLOW_INSECURE_NO_AUTH: true # Change this to false if auth is enabled
      AUTH_SECRET: long-random-password # Generate a random secret with "openssl rand -base64 32"
      AUTH_CREDENTIALS_ENABLED: false # Change to true if you want to use credentials for login. Required for below local admin.
      # Local admin created on first credentials login when auth is on.
      AUTH_BOOTSTRAP_USER: admin # Change this to something other than the default if desired
      AUTH_BOOTSTRAP_PASSWORD: changeme # Change this is a secure password
      DATA_DIR: /data
      DATABASE_URL: file:/data/3dmaster.db
      # OIDC_ISSUER: https://idp.example.com/application/o/3dmaster/
      # OIDC_CLIENT_ID: ...
      # OIDC_CLIENT_SECRET: ...
      # OIDC_GROUP_CLAIM: groups
      # OIDC_ALLOWED_GROUPS: 3d-printers
      # OIDC_ALLOW_ALL_GROUPS: "false"
      # AUTH_URL: https://3dmaster.example.com
      # AUTH_TRUST_HOST: "true"
      # TRUST_PROXY: "true"
    volumes:
      - 3dmaster-data:/data
    restart: unless-stopped

volumes:
  3dmaster-data:
