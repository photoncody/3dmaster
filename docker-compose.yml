services:
  3dmaster:
    image: ghcr.io/photoncody/3dmaster:latest
    # build: .
    ports:
      - "3000:3000"
    environment:
      AUTH_ENABLED: "false"
      # openssl rand -base64 32
      AUTH_SECRET: "change-me-to-a-long-random-string"
      DATA_DIR: /data
      DATABASE_URL: file:/data/3dmaster.db
      # Optional auth when AUTH_ENABLED=true:
      # AUTH_BOOTSTRAP_USER: admin
      # AUTH_BOOTSTRAP_PASSWORD: change-me
      # OIDC_ISSUER: https://idp.example.com/application/o/3dmaster/
      # OIDC_CLIENT_ID: ...
      # OIDC_CLIENT_SECRET: ...
      # OIDC_GROUP_CLAIM: groups
      # OIDC_ALLOWED_GROUPS: 3d-printers
      # AUTH_URL: https://3dmaster.example.com
    volumes:
      - 3dmaster-data:/data
    restart: unless-stopped

volumes:
  3dmaster-data:
